const $=s=>document.querySelector(s), app=$('#app'); let state={};
const small={ぁ:'あ',ぃ:'い',ぅ:'う',ぇ:'え',ぉ:'お',ゃ:'や',ゅ:'ゆ',ょ:'よ',っ:'つ',ゎ:'わ'};
const stripMarks=s=>s.normalize('NFD').replace(/[\u3099\u309A]/g,'').normalize('NFC');
const cleanRead=r=>stripMarks(String(r)).replace(/ー/g,'').replace(/[ぁぃぅぇぉゃゅょっゎ]/g,c=>small[c]);
const last=r=>cleanRead(r).slice(-1), first=r=>cleanRead(r)[0], hearts=n=>'♥'.repeat(n)+'♡'.repeat(3-n), shuffle=a=>[...a].sort(()=>Math.random()-.5);
const playableCountries=()=>countries.filter(c=>last(c.read)!=='ん');
const hasNextFrom=(country,used=[],allowUsed=false)=>playableCountries().some(c=>(allowUsed||!used.includes(c.id))&&c.id!==country.id&&first(c.read)===last(country.read));
function screen(html){app.innerHTML='<section class="screen">'+html+'</section>'} function title(){screen('<div class="center screen"><h1 class="title">🇯🇵 国旗しりとり</h1><p class="lead">国旗だけを見て、しりとりでつながる国を選ぼう。</p><div class="row"><button id="solo">1人モード</button><button id="multi" class="secondary">2〜4人対戦</button></div><p class="small">ヒントを見るまで国名は隠れます。GitHub Pagesでそのまま動きます。</p></div>');$('#solo').onclick=()=>startSolo();$('#multi').onclick=()=>setupMulti()}
function setupMulti(){screen('<div class="center"><h2>対戦の準備</h2><p class="lead">同じ端末を順番に回して遊びます。</p><div class="form"><label>人数 <select id="num"><option>2</option><option>3</option><option>4</option></select></label><div id="names"></div><button id="go">開始</button><button class="ghost" id="back">戻る</button></div></div>');const draw=()=>{$('#names').innerHTML=Array.from({length:+$('#num').value},(_,i)=>`<input id="p${i}" maxlength="10" placeholder="プレーヤー${i+1}">`).join('')};$('#num').onchange=draw;draw();$('#back').onclick=title;$('#go').onclick=()=>{const players=Array.from({length:+$('#num').value},(_,i)=>({name:$('#p'+i).value.trim()||`プレーヤー${i+1}`,hp:3,out:false}));startGame('multi',players)}}
function startSolo(){startGame('solo',[{name:'あなた',hp:3,out:false}])} function startGame(mode,players){const current=shuffle(playableCountries().filter(c=>hasNextFrom(c)))[0];state={mode,players,turn:0,q:0,used:[current.id],current,need:last(current.read),show:false,msg:`いまの国：${current.name}`,over:false};next()}
function activePlayers(){return state.players.filter(p=>!p.out)} function current(){return state.players[state.turn]} function nextTurn(){let i=state.turn;do{i=(i+1)%state.players.length}while(state.players[i].out);state.turn=i}
function next(){state.q++;state.show=false;state.answer=pickAnswer();state.choices=buildChoices(state.answer,state.need);renderGame()}
function recentlyBlocked(c){return c.id===state.current?.id||c.id===state.prev?.id}
function answerPool(allowUsed=false){const base=playableCountries().filter(c=>first(c.read)===state.need&&!recentlyBlocked(c)&&(allowUsed||!state.used.includes(c.id)));const safe=base.filter(c=>state.q>=10||hasNextFrom(c,[...state.used,c.id],allowUsed));return safe.length?safe:base}
function pickAnswer(){let pool=answerPool(false); if(!pool.length)pool=answerPool(true); return shuffle(pool)[0]||null}
function buildChoices(answer,need){if(!answer)return[];const wrong=shuffle(countries.filter(c=>c.id!==answer.id&&first(c.read)!==need)).slice(0,2);return shuffle([answer,...wrong])}
function renderGame(){let p=current();if(!state.answer)return result('続けられる国がありません');screen(`<div class="status"><span class="pill">${state.mode==='solo'?`第${state.q}/10問`:`${p.name}の番`}</span><span class="pill hearts">${hearts(p.hp)}</span></div><div class="players">${state.players.map((x,i)=>`<div class="player ${i===state.turn?'active':''} ${x.out?'out':''}">${x.name}<br><span class="hearts">${hearts(x.hp)}</span></div>`).join('')}</div><div class="status"><span class="pill">いまの国：${state.current.svg} ${state.current.name}</span></div><p class="prompt">「${state.need}」から始まる国旗を選ぼう</p><div class="grid">${state.choices.map(c=>`<button class="flagBtn" data-id="${c.id}">${c.svg}<span class="flagName ${state.show?'':'hiddenName'}">${c.name}</span></button>`).join('')}</div><div class="row"><button id="hint" class="secondary">${state.show?'ヒントを隠す':'ヒントを見る'}</button><button id="restart" class="ghost">最初から</button></div><div class="msg ${state.msg[0]==='正'?'ok':'bad'}">${state.msg}</div>`);document.querySelectorAll('.flagBtn').forEach(b=>b.onclick=()=>answer(b.dataset.id));$('#hint').onclick=()=>{state.show=!state.show;renderGame()};$('#restart').onclick=title}
function continueFrom(country){state.prev=state.current;if(!state.used.includes(country.id))state.used.push(country.id);state.current=country;state.need=last(country.read)}
function answer(id){let c=countries.find(x=>x.id===id), p=current(), ok=id===state.answer.id && first(c.read)===state.need; if(ok){continueFrom(c);state.msg='正解！ '+c.name; if(state.mode==='solo'&&state.q>=10)return result('10問クリア！'); if(state.mode==='multi')nextTurn(); return setTimeout(next,450)} p.hp--;continueFrom(state.answer);state.msg='不正解… 正解は '+state.answer.name; if(p.hp<=0){p.out=true;state.msg+=`。${p.name}は脱落`; if(state.mode==='solo')return result('ゲームオーバー'); if(activePlayers().length<=1)return result(activePlayers()[0].name+'の勝ち！')} if(state.mode==='multi')nextTurn(); setTimeout(next,700)}
function result(head){screen(`<div class="center"><h2 class="title">${head}</h2><ol class="resultList">${state.players.slice().sort((a,b)=>b.hp-a.hp).map(p=>`<li>${p.name}：${p.out?'脱落':'生存'} / ${hearts(p.hp)}</li>`).join('')}</ol><p class="lead">遊んだ問題数：${Math.min(state.q,10)}問</p><div class="row"><button id="again">もう一度遊ぶ</button><button id="home" class="secondary">タイトルへ</button></div></div>`);$('#again').onclick=()=>state.mode==='solo'?startSolo():setupMulti();$('#home').onclick=title}
title();})();
