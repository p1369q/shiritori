<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>国旗しりとりゲーム</title>
  <style>
    :root{--bg:#eef7ff;--card:#fff;--ink:#123;--muted:#587;--main:#1167d8;--ok:#0b8f5a;--bad:#d73838;--shadow:0 14px 40px #1d487522;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);--safe-left:env(safe-area-inset-left);--safe-right:env(safe-area-inset-right)}
    *{box-sizing:border-box} html,body{height:100%;margin:0} body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(140deg,#e9f8ff,#fff7dd);color:var(--ink);overflow:hidden}
    button,input{font:inherit} button{min-height:44px;border:0;border-radius:16px;padding:.8rem 1rem;font-weight:800;background:var(--main);color:#fff;box-shadow:0 6px 14px #1167d833;touch-action:manipulation} button.secondary{background:#e8f1ff;color:#17416f} button.ghost{background:#fff;color:#17416f;border:2px solid #cde0f7;box-shadow:none} button:active{transform:translateY(1px)}
    .app{height:100dvh;padding:calc(10px + var(--safe-top)) calc(12px + var(--safe-right)) calc(10px + var(--safe-bottom)) calc(12px + var(--safe-left));display:grid;place-items:center}.screen{width:min(980px,100%);height:min(760px,100%);background:rgba(255,255,255,.92);border-radius:28px;box-shadow:var(--shadow);padding:clamp(14px,3vw,28px);display:flex;flex-direction:column;gap:clamp(10px,2vh,18px);overflow:hidden}.center{text-align:center;align-items:center;justify-content:center}.title{font-size:clamp(2rem,7vw,4.4rem);line-height:1;margin:.1em 0}.lead{font-size:clamp(1rem,2.6vw,1.35rem);color:#345;margin:0}.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,2vw,18px);width:100%}.flagBtn{background:#fff;color:var(--ink);border:3px solid #d7e6f5;border-radius:20px;padding:clamp(6px,1.5vw,14px);min-height:0;box-shadow:0 8px 20px #11447716;display:flex;flex-direction:column;align-items:center;gap:7px}.flagBtn svg{width:100%;max-width:240px;aspect-ratio:3/2;border-radius:10px;box-shadow:inset 0 0 0 1px #0002}.flagName{font-size:clamp(.78rem,2.5vw,1.05rem);min-height:1.2em}.hiddenName{visibility:hidden}.status{display:flex;gap:8px;justify-content:space-between;align-items:center;flex-wrap:wrap}.pill{background:#eef6ff;border-radius:999px;padding:.45rem .75rem;font-weight:800}.hearts{color:#e93055;letter-spacing:.08em}.prompt{font-size:clamp(1.2rem,4vw,2rem);font-weight:900;text-align:center;margin:0}.msg{min-height:1.5em;text-align:center;font-weight:800}.ok{color:var(--ok)}.bad{color:var(--bad)}.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}.player{background:#f4f9ff;border-radius:16px;padding:.6rem;border:2px solid transparent}.player.active{border-color:var(--main)}.player.out{opacity:.45;text-decoration:line-through}.form{display:grid;gap:10px;width:min(520px,100%)}input{min-height:46px;border:2px solid #cfe0f2;border-radius:14px;padding:.7rem 1rem}.small{font-size:.9rem;color:#567}.spacer{flex:1}.resultList{margin:.2rem 0;padding-left:1.2rem;text-align:left}.sr{position:absolute;left:-9999px}
    @media (max-width:560px){.screen{border-radius:22px}.grid{gap:6px}.flagBtn{border-width:2px;border-radius:14px}.flagName{font-size:.72rem}button{padding:.65rem .75rem}.players{font-size:.82rem;grid-template-columns:repeat(2,1fr)}.prompt{font-size:1.15rem}.lead{font-size:.95rem}}
    @media (max-height:560px) and (orientation:landscape){.screen{padding:10px;gap:7px}.title{font-size:2rem}.lead,.small{font-size:.82rem}.flagBtn svg{max-width:150px}button{min-height:38px;padding:.45rem .7rem}.players{display:none}.prompt{font-size:1.05rem}.msg{min-height:1em}}
  </style>
</head>
<body><main id="app" class="app"></main><script>
(()=>{"use strict";
const countries=[
{id:'japan',name:'日本',read:'にほん',svg:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#fff"/><circle cx="1.5" cy="1" r=".55" fill="#bc002d"/></svg>'},
{id:'brazil',name:'ブラジル',read:'ぶらじる',svg:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#009b3a"/><path d="M1.5 .25 2.75 1 1.5 1.75 .25 1z" fill="#ffdf00"/><circle cx="1.5" cy="1" r=".42" fill="#002776"/></svg>'},
{id:'rwanda',name:'ルワンダ',read:'るわんだ',svg:'<svg viewBox="0 0 3 2"><rect width="3" height="1" fill="#00a1de"/><rect y="1" width="3" height=".5" fill="#fad201"/><rect y="1.5" width="3" height=".5" fill="#20603d"/><circle cx="2.45" cy=".45" r=".16" fill="#e5be01"/></svg>'},
{id:'denmark',name:'デンマーク',read:'でんまーく',svg:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#c8102e"/><path d="M.9 0h.28v2H.9zM0 .86h3v.28H0z" fill="#fff"/></svg>'},
{id:'canada',name:'カナダ',read:'かなだ',svg:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#fff"/><rect width=".75" height="2" fill="#d52b1e"/><rect x="2.25" width=".75" height="2" fill="#d52b1e"/><path d="M1.5 .35l.12 .34.3-.12-.16 .3.32 .09-.33 .1.15 .31-.29-.13-.11 .34-.11-.34-.29 .13.15-.31-.33-.1.32-.09-.16-.3.3 .12z" fill="#d52b1e"/></svg>'},
{id:'germany',name:'ドイツ',read:'どいつ',svg:'<svg viewBox="0 0 3 2"><rect width="3" height=".67" fill="#000"/><rect y=".67" width="3" height=".66" fill="#dd0000"/><rect y="1.33" width="3" height=".67" fill="#ffce00"/></svg>'},
{id:'switzerland',name:'スイス',read:'すいす',svg:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#d52b1e"/><path d="M1.3 .45h.4v1.1h-.4zM.95 .8h1.1v.4H.95z" fill="#fff"/></svg>'},
{id:'spain',name:'スペイン',read:'すぺいん',svg:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#aa151b"/><rect y=".5" width="3" height="1" fill="#f1bf00"/></svg>'},
{id:'thailand',name:'タイ',read:'たい',svg:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#a51931"/><rect y=".33" width="3" height="1.34" fill="#fff"/><rect y=".58" width="3" height=".84" fill="#2d2a4a"/></svg>'},
{id:'india',name:'インド',read:'いんど',svg:'<svg viewBox="0 0 3 2"><rect width="3" height=".67" fill="#ff9933"/><rect y=".67" width="3" height=".66" fill="#fff"/><rect y="1.33" width="3" height=".67" fill="#138808"/><circle cx="1.5" cy="1" r=".18" fill="none" stroke="#000080" stroke-width=".04"/></svg>'},
{id:'turkey',name:'トルコ',read:'とるこ',svg:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#e30a17"/><circle cx="1.2" cy="1" r=".43" fill="#fff"/><circle cx="1.32" cy="1" r=".34" fill="#e30a17"/><path d="M1.82 1l.38-.12-.24 .32v-.4l.24 .32z" fill="#fff"/></svg>'},
{id:'korea',name:'韓国',read:'こく',svg:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#fff"/><circle cx="1.5" cy="1" r=".35" fill="#c60c30"/><path d="M1.15 1a.35.35 0 0 0 .7 0 .35.35 0 0 1-.7 0" fill="#003478"/><g stroke="#000" stroke-width=".06"><path d="M.65 .45l.35 .25M.55 .6l.35 .25M2 .7l.35-.25M2.1 .85l.35-.25M.65 1.55l.35-.25M.55 1.4l.35-.25M2 1.3l.35 .25M2.1 1.15l.35 .25"/></g></svg>'}
];
const $=s=>document.querySelector(s), app=$('#app'); let state={};
const stripMarks=s=>s.normalize('NFD').replace(/[\u3099\u309A]/g,'').normalize('NFC');
const cleanRead=r=>stripMarks(String(r)).replace(/ー/g,'');
const last=r=>cleanRead(r).slice(-1), first=r=>cleanRead(r)[0], hearts=n=>'♥'.repeat(n)+'♡'.repeat(3-n), shuffle=a=>[...a].sort(()=>Math.random()-.5);
const playableCountries=()=>countries.filter(c=>last(c.read)!=='ん');
const hasNextFrom=(country,used=[])=>playableCountries().some(c=>!used.includes(c.id)&&c.id!==country.id&&first(c.read)===last(country.read));
function screen(html){app.innerHTML='<section class="screen">'+html+'</section>'} function title(){screen('<div class="center screen"><h1 class="title">🇯🇵 国旗しりとり</h1><p class="lead">国旗だけを見て、しりとりでつながる国を選ぼう。</p><div class="row"><button id="solo">1人モード</button><button id="multi" class="secondary">2〜4人対戦</button></div><p class="small">ヒントを見るまで国名は隠れます。GitHub Pagesでそのまま動きます。</p></div>');$('#solo').onclick=()=>startSolo();$('#multi').onclick=()=>setupMulti()}
function setupMulti(){screen('<div class="center"><h2>対戦の準備</h2><p class="lead">同じ端末を順番に回して遊びます。</p><div class="form"><label>人数 <select id="num"><option>2</option><option>3</option><option>4</option></select></label><div id="names"></div><button id="go">開始</button><button class="ghost" id="back">戻る</button></div></div>');const draw=()=>{$('#names').innerHTML=Array.from({length:+$('#num').value},(_,i)=>`<input id="p${i}" maxlength="10" placeholder="プレーヤー${i+1}">`).join('')};$('#num').onchange=draw;draw();$('#back').onclick=title;$('#go').onclick=()=>{const players=Array.from({length:+$('#num').value},(_,i)=>({name:$('#p'+i).value.trim()||`プレーヤー${i+1}`,hp:3,out:false}));startGame('multi',players)}}
function startSolo(){startGame('solo',[{name:'あなた',hp:3,out:false}])} function startGame(mode,players){const current=shuffle(playableCountries().filter(c=>hasNextFrom(c)))[0];state={mode,players,turn:0,q:0,used:[current.id],current,need:last(current.read),show:false,msg:`いまの国：${current.name}`,over:false};next()}
function activePlayers(){return state.players.filter(p=>!p.out)} function current(){return state.players[state.turn]} function nextTurn(){let i=state.turn;do{i=(i+1)%state.players.length}while(state.players[i].out);state.turn=i}
function next(){state.q++;state.show=false;state.answer=pickAnswer();state.choices=buildChoices(state.answer,state.need);renderGame()}
function pickAnswer(){let pool=playableCountries().filter(c=>!state.used.includes(c.id)&&first(c.read)===state.need); return shuffle(pool)[0]||null}
function buildChoices(answer,need){if(!answer)return[];const wrong=shuffle(countries.filter(c=>c.id!==answer.id&&first(c.read)!==need)).slice(0,2);return shuffle([answer,...wrong])}
function renderGame(){let p=current();if(!state.answer)return result('続けられる国がありません');screen(`<div class="status"><span class="pill">${state.mode==='solo'?`第${state.q}/10問`:`${p.name}の番`}</span><span class="pill hearts">${hearts(p.hp)}</span></div><div class="players">${state.players.map((x,i)=>`<div class="player ${i===state.turn?'active':''} ${x.out?'out':''}">${x.name}<br><span class="hearts">${hearts(x.hp)}</span></div>`).join('')}</div><div class="status"><span class="pill">いまの国：${state.current.svg} ${state.current.name}</span></div><p class="prompt">「${state.need}」から始まる国旗を選ぼう</p><div class="grid">${state.choices.map(c=>`<button class="flagBtn" data-id="${c.id}">${c.svg}<span class="flagName ${state.show?'':'hiddenName'}">${c.name}</span></button>`).join('')}</div><div class="row"><button id="hint" class="secondary">ヒントを見る</button><button id="restart" class="ghost">最初から</button></div><div class="msg ${state.msg[0]==='正'?'ok':'bad'}">${state.msg}</div>`);document.querySelectorAll('.flagBtn').forEach(b=>b.onclick=()=>answer(b.dataset.id));$('#hint').onclick=()=>{state.show=true;renderGame()};$('#restart').onclick=title}
function continueFrom(country){state.used.push(country.id);state.current=country;state.need=last(country.read)}
function answer(id){let c=countries.find(x=>x.id===id), p=current(), ok=id===state.answer.id && first(c.read)===state.need; if(ok){continueFrom(c);state.msg='正解！ '+c.name; if(state.mode==='solo'&&state.q>=10)return result('10問クリア！'); if(state.mode==='multi')nextTurn(); return setTimeout(next,450)} p.hp--;continueFrom(state.answer);state.msg='不正解… 正解は '+state.answer.name; if(p.hp<=0){p.out=true;state.msg+=`。${p.name}は脱落`; if(state.mode==='solo')return result('ゲームオーバー'); if(activePlayers().length<=1)return result(activePlayers()[0].name+'の勝ち！')} if(state.mode==='multi')nextTurn(); setTimeout(next,700)}
function result(head){screen(`<div class="center"><h2 class="title">${head}</h2><ol class="resultList">${state.players.slice().sort((a,b)=>b.hp-a.hp).map(p=>`<li>${p.name}：${p.out?'脱落':'生存'} / ${hearts(p.hp)}</li>`).join('')}</ol><p class="lead">遊んだ問題数：${Math.min(state.q,10)}問</p><div class="row"><button id="again">もう一度遊ぶ</button><button id="home" class="secondary">タイトルへ</button></div></div>`);$('#again').onclick=()=>state.mode==='solo'?startSolo():setupMulti();$('#home').onclick=title}
title();})();
</script></body></html>
