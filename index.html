<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>国旗しりとりゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app" class="app"></main>
  <script src="data/countries.js"></script>
  <script>(()=>{"use strict";
const countries=(window.MANABI_DATA?.countries||[]).filter(c=>c.flagFile&&c.code&&c.reading);
const $=s=>document.querySelector(s), app=$("#app");
const small={ぁ:"あ",ぃ:"い",ぅ:"う",ぇ:"え",ぉ:"お",ゃ:"や",ゅ:"ゆ",ょ:"よ",っ:"つ",ゎ:"わ"};
const strip=s=>String(s).normalize("NFD").replace(/[\u3099\u309A]/g,"").normalize("NFC");
const clean=r=>strip(r).replace(/ー/g,"").replace(/[ぁぃぅぇぉゃゅょっゎ]/g,c=>small[c]);
const first=r=>clean(r)[0], last=r=>clean(r).slice(-1), shuffle=a=>[...a].sort(()=>Math.random()-.5);
const HIGH_SCORE_KEY="shiritoriHighScore", BEST_STREAK_KEY="shiritoriBestStreak";
const CORRECT_RESULT_DELAY=2000, INCORRECT_RESULT_DELAY=3000;
const getRecord=k=>{try{return Math.max(0,Number(localStorage.getItem(k))||0)}catch{return 0}};
const setRecord=(k,v)=>{try{localStorage.setItem(k,String(v))}catch{}};
const hearts=n=>"❤️".repeat(Math.max(0,n))+"♡".repeat(Math.max(0,3-n));
const flagImg=(c,cls="")=>`<img class="flag ${cls}" src="${c.flagFile}" alt="${c.name}の国旗" loading="eager">`;
const playable=()=>countries.filter(c=>last(c.reading)!=="ん");
let state={ui:"waiting",hintOpen:false,moreOpen:false};
function canNext(country,used=[]){return playable().some(c=>c.id!==country.id&&!used.includes(c.id)&&first(c.reading)===last(country.reading));}
function screen(html,cls=""){app.innerHTML=`<section class="screen ${cls}">${html}</section>`;}
function title(){state.ui="waiting";screen(`<div class="center"><p class="eyebrow">世界旅行クイズ</p><h1 class="title">国旗しりとり</h1><p class="lead">正確な国旗を見て、前の国の最後の文字から始まる国を選ぼう。</p><div class="row"><button id="solo">1人で遊ぶ</button><button id="multi" class="secondary">2〜4人対戦</button><button id="gallery" class="ghost">国旗を確認</button></div></div>`,"home");$('#solo').onclick=()=>start('solo',[newPlayer('あなた')]);$('#multi').onclick=setupMulti;$('#gallery').onclick=gallery;}
function newPlayer(name){return {name,hp:3,out:false,score:0,streak:0,bestStreak:0};}
function setupMulti(){screen(`<div class="center"><h2>対戦の準備</h2><div class="form"><label>人数<select id="num"><option>2</option><option>3</option><option>4</option></select></label><div id="names"></div><button id="go">開始</button><button id="back" class="ghost">戻る</button></div></div>`);const draw=()=>{$('#names').innerHTML=Array.from({length:+$('#num').value},(_,i)=>`<input id="p${i}" maxlength="10" placeholder="プレイヤー${i+1}">`).join('')};$('#num').onchange=draw;draw();$('#back').onclick=title;$('#go').onclick=()=>start('multi',Array.from({length:+$('#num').value},(_,i)=>newPlayer($('#p'+i).value.trim()||`プレイヤー${i+1}`)));}
function gallery(){const items=countries.slice(0,30);screen(`<h2>国旗素材（代表30か国）</h2><div class="flagGallery">${items.map(c=>`<figure>${flagImg(c)}<figcaption>${c.name}</figcaption></figure>`).join('')}</div><div class="row"><button id="back" class="secondary">タイトルへ</button></div>`);$('#back').onclick=title;}
function start(mode,players){const current=shuffle(playable().filter(c=>canNext(c)))[0];state={ui:"waiting",mode,players,turn:0,used:[current.id],current,need:last(current.reading),feedback:null,hintOpen:false,moreOpen:false,highScore:getRecord(HIGH_SCORE_KEY),savedBestStreak:getRecord(BEST_STREAK_KEY),bestUpdated:false};nextQuestion(false);}
function active(){return state.players.filter(p=>!p.out)} function player(){return state.players[state.turn]} function nextTurn(){let i=state.turn;do{i=(i+1)%state.players.length}while(state.players[i].out);state.turn=i;}
function pool(allowUsed=false){const base=playable().filter(c=>first(c.reading)===state.need&&c.id!==state.current.id&&(allowUsed||!state.used.includes(c.id)));const safe=base.filter(c=>canNext(c,[...state.used,c.id]));return safe.length?safe:base;}
function pickAnswer(){let p=pool(false); if(!p.length)p=pool(true); return shuffle(p)[0]||null;}
function choices(answer){const wrong=shuffle(countries.filter(c=>c.id!==answer.id&&first(c.reading)!==state.need)).slice(0,2);return shuffle([answer,...wrong]);}
function nextQuestion(){state.ui="waiting";state.feedback=null;state.hintOpen=false;state.moreOpen=false;state.answer=pickAnswer();if(!state.answer)return result('続けられる国がありません');state.choices=choices(state.answer);renderGame();}
function statusHtml(){const p=player();if(state.mode==='multi')return `<header class="topbar multiTop"><strong>${p.name}</strong><span>正解 ${p.score}</span><span>ライフ <b class="life">${hearts(p.hp)}</b></span></header><section class="playerBoard">${state.players.map((x,i)=>`<div class="playerBadge ${x.out?'out':''} ${i===state.turn?'current':''}"><strong>${x.name}</strong><span>${x.score}問　<b class="life">${hearts(x.hp)}</b></span></div>`).join('')}</section>`;return `<header class="topbar"><span>正解 ${p.score}</span><span>連続 ${p.streak}</span><span>ライフ <b class="life">${hearts(p.hp)}</b></span></header>`;}
function renderGame(){screen(`${statusHtml()}<section class="currentCountry" aria-label="いまの国">${flagImg(state.current,'currentFlag')}<div><span>現在の国</span><strong>${state.current.name}</strong><small>${state.current.reading}</small></div></section><section class="question"><span>つぎは「</span><strong>${state.need}</strong><span>」から始まる国</span></section><section class="choices" aria-label="選択肢">${state.choices.map(c=>choiceButton(c)).join('')}</section><section class="feedbackLine" aria-live="polite">${feedbackLine()}</section><footer class="gameActions"><button id="hint" class="hint" ${state.ui!=='waiting'?'disabled':''}>${state.hintOpen?'ヒントを隠す':'ヒントを見る'}</button><button id="restart" class="menuRestart" type="button" ${state.ui!=='waiting'?'disabled':''}>メニュー</button></footer>`,"game");document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>answer(b.dataset.id));$('#hint').onclick=toggleHint;$('#restart').onclick=confirmRestart;document.querySelector('#more')?.addEventListener('click',()=>{state.moreOpen=!state.moreOpen;renderGame();});}
function choiceButton(c){const picked=state.feedback?.picked===c.id, correct=state.feedback&&state.answer.id===c.id;let label='',cls='',show=state.hintOpen;if(state.ui==='correct'&&picked){label='正解！';cls=' isCorrect';show=true}else if(state.ui==='incorrect'&&picked){label='ちがう';cls=' isWrong';show=true}else if(state.ui==='incorrect'&&correct){label='正解';cls=' isCorrect';show=true}return `<button type="button" class="choice${cls}" data-id="${c.id}" ${state.ui!=='waiting'?'disabled':''}>${flagImg(c)}<span class="resultMark">${label}</span>${show?`<b class="revealedName">${c.name}</b>`:'<b class="revealedName placeholder">&nbsp;</b>'}</button>`;}
function feedbackLine(){if(!state.feedback)return '';const c=state.feedback.country;const msg=state.feedback.ok?`正解！ ${c.name}`:`正解は${c.name}`;return `<div class="miniFeedback ${state.feedback.ok?'ok':'bad'}"><strong>${msg}</strong><button id="more" type="button" class="more">${state.moreOpen?'閉じる':'もっと見る'}</button>${state.moreOpen?`<p>首都：${c.capital||'—'}。${c.trivia||''}</p>`:''}</div>`;}
function answer(id){if(state.ui!=="waiting")return;state.ui='answering';renderGame();window.setTimeout(()=>{const p=player(),picked=countries.find(c=>c.id===id),ok=id===state.answer.id,correctCountry=state.answer;state.ui=ok?'correct':'incorrect';state.feedback={ok,picked:id,country:correctCountry};if(ok){p.score++;p.streak++;p.bestStreak=Math.max(p.bestStreak,p.streak);if(state.mode==='solo'){state.savedBestStreak=Math.max(state.savedBestStreak,p.bestStreak);setRecord(BEST_STREAK_KEY,state.savedBestStreak);}}else{p.hp--;p.streak=0;}renderGame();window.setTimeout(()=>{advance(correctCountry);if(state.mode==='solo'&&p.hp<=0)return result('ゲーム終了');if(state.mode==='multi'){if(p.hp<=0)p.out=true;if(active().length<=1)return result(`${active()[0]?.name||'該当者なし'}の勝ち！`);nextTurn();}nextQuestion();},ok?CORRECT_RESULT_DELAY:INCORRECT_RESULT_DELAY);},80);}
function advance(c){if(!state.used.includes(c.id))state.used.push(c.id);state.current=c;state.need=last(c.reading);}
function toggleHint(){if(state.ui!=="waiting")return;state.hintOpen=!state.hintOpen;renderGame();}
function confirmRestart(){if(state.ui!=="waiting")return;if(confirm('タイトルへ戻りますか？'))title();}
function result(head){state.ui='finished';let body;if(state.mode==='solo'){const p=state.players[0],old=state.highScore,high=Math.max(old,p.score);state.bestUpdated=p.score>old;if(state.bestUpdated)setRecord(HIGH_SCORE_KEY,high);body=`${state.bestUpdated?'<p class="bestUpdate">🎉 自己ベスト更新！</p>':''}<p>正解数：<strong>${p.score}問</strong></p><p>最高連続正解：<strong>${p.bestStreak}問</strong></p><p>自己ベスト：<strong>${high}問</strong></p>`;}else{body=`<ol class="resultList">${state.players.map(p=>`<li>${p.name}：${p.score}問 / ${p.out?'脱落':'勝ち残り'} / <b class="life">${hearts(Math.max(0,p.hp))}</b></li>`).join('')}</ol>`;}screen(`<div class="center"><h2 class="title">${head}</h2>${body}<div class="row"><button id="again">もう一度遊ぶ</button><button id="home" class="secondary">タイトルへ</button></div></div>`);$('#again').onclick=()=>state.mode==='solo'?start('solo',[newPlayer('あなた')]):setupMulti();$('#home').onclick=title;}
title();})();</script>
</body>
</html>
