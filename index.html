<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>国旗しりとりゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app" class="app"></main>
  <script src="data/countries.js"></script>
  <script>
(()=>{"use strict";
const countries=(window.MANABI_DATA?.countries||[]).filter(c=>c.flagFile&&c.flagCode&&c.reading);
const $=s=>document.querySelector(s), app=$("#app");
const small={ぁ:"あ",ぃ:"い",ぅ:"う",ぇ:"え",ぉ:"お",ゃ:"や",ゅ:"ゆ",ょ:"よ",っ:"つ",ゎ:"わ"};
const strip=s=>String(s).normalize("NFD").replace(/[\u3099\u309A]/g,"").normalize("NFC");
const clean=r=>strip(r).replace(/ー/g,"").replace(/[ぁぃぅぇぉゃゅょっゎ]/g,c=>small[c]);
const first=r=>clean(r)[0], last=r=>clean(r).slice(-1), shuffle=a=>[...a].sort(()=>Math.random()-.5);
const hearts=n=>"❤️".repeat(n)+"♡".repeat(3-n);
const flagImg=(c,cls="")=>`<img class="flag ${cls}" src="${c.flagFile}" alt="${c.name}の国旗" loading="eager">`;
const playable=()=>countries.filter(c=>last(c.reading)!=="ん");
let state={ui:"waiting"};
function canNext(country,used=[]){return playable().some(c=>c.id!==country.id&&!used.includes(c.id)&&first(c.reading)===last(country.reading));}
function screen(html,cls=""){app.innerHTML=`<section class="screen ${cls}">${html}</section>`;}
function title(){state.ui="waiting";screen(`<div class="center"><p class="eyebrow">世界旅行クイズ</p><h1 class="title">国旗しりとり</h1><p class="lead">国旗だけを見て、前の国の最後の文字から始まる国を選ぼう。</p><div class="row"><button id="solo">1人で遊ぶ</button><button id="multi" class="secondary">2〜4人対戦</button><button id="gallery" class="ghost">国旗を確認</button></div></div>`,"home");$('#solo').onclick=()=>start('solo',[{name:'あなた',hp:3,out:false}]);$('#multi').onclick=setupMulti;$('#gallery').onclick=gallery;}
function setupMulti(){screen(`<div class="center"><h2>対戦の準備</h2><div class="form"><label>人数<select id="num"><option>2</option><option>3</option><option>4</option></select></label><div id="names"></div><button id="go">開始</button><button id="back" class="ghost">戻る</button></div></div>`);const draw=()=>{$('#names').innerHTML=Array.from({length:+$('#num').value},(_,i)=>`<input id="p${i}" maxlength="10" placeholder="プレイヤー${i+1}">`).join('')};$('#num').onchange=draw;draw();$('#back').onclick=title;$('#go').onclick=()=>start('multi',Array.from({length:+$('#num').value},(_,i)=>({name:$('#p'+i).value.trim()||`プレイヤー${i+1}`,hp:3,out:false})));}
function gallery(){const items=countries.slice(0,24);screen(`<h2>国旗素材</h2><div class="flagGallery">${items.map(c=>`<figure>${flagImg(c)}<figcaption>${c.name}</figcaption></figure>`).join('')}</div><div class="row"><button id="back" class="secondary">タイトルへ</button></div>`);$('#back').onclick=title;}
function start(mode,players){const current=shuffle(playable().filter(c=>canNext(c)))[0];state={ui:"waiting",mode,players,turn:0,q:0,total:10,hints:2,used:[current.id],current,need:last(current.reading),feedback:null,over:false};nextQuestion(false);}
function active(){return state.players.filter(p=>!p.out)} function player(){return state.players[state.turn]} function nextTurn(){let i=state.turn;do{i=(i+1)%state.players.length}while(state.players[i].out);state.turn=i;}
function pool(allowUsed=false){const base=playable().filter(c=>first(c.reading)===state.need&&c.id!==state.current.id&&(allowUsed||!state.used.includes(c.id)));return base.filter(c=>canNext(c,[...state.used,c.id])).length?base.filter(c=>canNext(c,[...state.used,c.id])):base;}
function pickAnswer(){let p=pool(false); if(!p.length)p=pool(true); return shuffle(p)[0]||null;}
function choices(answer){const wrong=shuffle(countries.filter(c=>c.id!==answer.id&&first(c.reading)!==state.need)).slice(0,2);return shuffle([answer,...wrong]);}
function nextQuestion(count=true){if(count)state.q++; else state.q=1; state.ui="waiting";state.feedback=null;state.answer=pickAnswer();if(!state.answer)return result('続けられる国がありません');state.choices=choices(state.answer);renderGame();}
function renderGame(){const p=player();screen(`<header class="topbar"><span>第${Math.min(state.q,state.total)}問 / ${state.total}問</span><strong>${state.mode==='multi'?p.name+'の番':p.name}</strong><span>ライフ <b class="life">${hearts(p.hp)}</b></span><button class="menuRestart" id="restart" type="button">最初から</button></header><section class="currentCountry" aria-label="いまの国"><span>いまの国</span>${flagImg(state.current,'currentFlag')}<strong>${state.current.name}</strong><small>読み：${state.current.reading}</small></section><section class="question"><span>つぎは</span><strong>「${state.need}」</strong><span>から始まる国</span></section><section class="choices" aria-label="選択肢">${state.choices.map(c=>choiceButton(c)).join('')}</section><section class="learning" aria-live="polite">${learnCard()}</section><footer class="gameActions"><button id="hint" class="hint" ${state.hints<=0||state.ui!=='waiting'?'disabled':''}>💡 ヒント ${state.hints}回</button></footer>`,"game");document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>answer(b.dataset.id));$('#hint').onclick=hint;$('#restart').onclick=confirmRestart;}
function choiceButton(c){const picked=state.feedback?.picked===c.id, correct=state.feedback&&state.answer.id===c.id;let label='',cls='';if(state.ui==='correct'&&picked){label='✓ 正解';cls=' isCorrect'}else if(state.ui==='incorrect'&&picked){label='× 不正解';cls=' isWrong'}else if(state.ui==='incorrect'&&correct){label='✓ 正解';cls=' isCorrect'}return `<button type="button" class="choice${cls}" data-id="${c.id}" ${state.ui!=='waiting'?'disabled':''}>${flagImg(c)}<span class="resultMark">${label}</span>${state.feedback&&(picked||correct)?`<b class="revealedName">${c.name}</b>`:''}</button>`;}
function learnCard(){if(!state.feedback)return '<span class="muted">答えると国名と豆知識が表示されます。</span>';const c=state.feedback.country;return `<div class="learnBox ${state.feedback.ok?'ok':'bad'}"><strong>${state.feedback.ok?'正解！':'確認しよう'} ${c.name}</strong><span>首都：${c.capital||'—'}</span><p>${c.trivia||'世界の国旗しりとりで登場する国です。'}</p></div>`;}
function answer(id){if(state.ui!=='waiting')return;state.ui='answering';renderGame();const picked=countries.find(c=>c.id===id), ok=id===state.answer.id;window.setTimeout(()=>{state.ui=ok?'correct':'incorrect';state.feedback={ok,picked:id,country:ok?picked:state.answer};if(ok){advance(picked);if(state.mode==='multi')nextTurn();}else{player().hp--;advance(state.answer);}renderGame();const delay=ok?1100:1700;window.setTimeout(()=>{state.ui='transitioning';if(state.mode==='solo'&&(state.q>=state.total||player().hp<=0))return result(player().hp<=0?'ゲームオーバー':'10問クリア！');if(state.mode==='multi'){if(player().hp<=0)player().out=true;if(active().length<=1)return result(`${active()[0].name}の勝ち！`);nextTurn();}nextQuestion(true);},delay);},180);}
function advance(c){if(!state.used.includes(c.id))state.used.push(c.id);state.current=c;state.need=last(c.reading);}
function hint(){if(state.ui!=='waiting'||state.hints<=0)return;state.hints--;alert(`ヒント：「${state.need}」から始まる国です。地域：${state.answer.region}`);renderGame();}
function confirmRestart(){if(state.ui==='answering'||state.ui==='transitioning')return;if(confirm('最初からやり直しますか？'))title();}
function result(head){state.ui='finished';screen(`<div class="center"><h2 class="title">${head}</h2><ol class="resultList">${state.players.map(p=>`<li>${p.name}：${p.out?'脱落':'プレイ終了'} / ${hearts(Math.max(0,p.hp))}</li>`).join('')}</ol><p class="lead">遊んだ問題数：${Math.min(state.q,state.total)}問</p><div class="row"><button id="again">もう一度</button><button id="home" class="secondary">タイトルへ</button></div></div>`);$('#again').onclick=()=>state.mode==='solo'?start('solo',[{name:'あなた',hp:3,out:false}]):setupMulti();$('#home').onclick=title;}
title();})();
  </script>
</body>
</html>
