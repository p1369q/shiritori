<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>国旗しりとりゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app" class="app"></main>
  <script src="data/countries.js"></script>
  <script>
(()=>{"use strict";
const countries=(window.MANABI_DATA?.countries||[]).filter(c=>c.flagFile&&c.code&&c.reading);
const $=s=>document.querySelector(s), app=$("#app");
const small={ぁ:"あ",ぃ:"い",ぅ:"う",ぇ:"え",ぉ:"お",ゃ:"や",ゅ:"ゆ",ょ:"よ",っ:"つ",ゎ:"わ"};
const strip=s=>String(s).normalize("NFD").replace(/[\u3099\u309A]/g,"").normalize("NFC");
const clean=r=>strip(r).replace(/ー/g,"").replace(/[ぁぃぅぇぉゃゅょっゎ]/g,c=>small[c]);
const first=r=>clean(r)[0], last=r=>clean(r).slice(-1), shuffle=a=>[...a].sort(()=>Math.random()-.5);
const hearts=n=>"♥".repeat(Math.max(0,n))+"♡".repeat(Math.max(0,3-n));
const flagImg=(c,cls="")=>`<img class="flag ${cls}" src="${c.flagFile}" alt="${c.name}の国旗" loading="eager">`;
const playable=()=>countries.filter(c=>last(c.reading)!=="ん");
let state={ui:"waiting",hintOpen:false,moreOpen:false};
function canNext(country,used=[]){return playable().some(c=>c.id!==country.id&&!used.includes(c.id)&&first(c.reading)===last(country.reading));}
function screen(html,cls=""){app.innerHTML=`<section class="screen ${cls}">${html}</section>`;}
function title(){state.ui="waiting";screen(`<div class="center"><p class="eyebrow">世界旅行クイズ</p><h1 class="title">国旗しりとり</h1><p class="lead">正確な国旗を見て、前の国の最後の文字から始まる国を選ぼう。</p><div class="row"><button id="solo">1人で遊ぶ</button><button id="multi" class="secondary">2〜4人対戦</button><button id="gallery" class="ghost">国旗を確認</button></div></div>`,"home");$('#solo').onclick=()=>start('solo',[{name:'あなた',hp:3,out:false}]);$('#multi').onclick=setupMulti;$('#gallery').onclick=gallery;}
function setupMulti(){screen(`<div class="center"><h2>対戦の準備</h2><div class="form"><label>人数<select id="num"><option>2</option><option>3</option><option>4</option></select></label><div id="names"></div><button id="go">開始</button><button id="back" class="ghost">戻る</button></div></div>`);const draw=()=>{$('#names').innerHTML=Array.from({length:+$('#num').value},(_,i)=>`<input id="p${i}" maxlength="10" placeholder="プレイヤー${i+1}">`).join('')};$('#num').onchange=draw;draw();$('#back').onclick=title;$('#go').onclick=()=>start('multi',Array.from({length:+$('#num').value},(_,i)=>({name:$('#p'+i).value.trim()||`プレイヤー${i+1}`,hp:3,out:false})));}
function gallery(){const items=countries.slice(0,30);screen(`<h2>国旗素材（代表30か国）</h2><div class="flagGallery">${items.map(c=>`<figure>${flagImg(c)}<figcaption>${c.name}</figcaption></figure>`).join('')}</div><div class="row"><button id="back" class="secondary">タイトルへ</button></div>`);$('#back').onclick=title;}
function start(mode,players){const current=shuffle(playable().filter(c=>canNext(c)))[0];state={ui:"waiting",mode,players,turn:0,q:0,total:10,used:[current.id],current,need:last(current.reading),feedback:null,hintOpen:false,moreOpen:false};nextQuestion(false);}
function active(){return state.players.filter(p=>!p.out)} function player(){return state.players[state.turn]} function nextTurn(){let i=state.turn;do{i=(i+1)%state.players.length}while(state.players[i].out);state.turn=i;}
function pool(allowUsed=false){const base=playable().filter(c=>first(c.reading)===state.need&&c.id!==state.current.id&&(allowUsed||!state.used.includes(c.id)));const safe=base.filter(c=>canNext(c,[...state.used,c.id]));return safe.length?safe:base;}
function pickAnswer(){let p=pool(false); if(!p.length)p=pool(true); return shuffle(p)[0]||null;}
function choices(answer){const wrong=shuffle(countries.filter(c=>c.id!==answer.id&&first(c.reading)!==state.need)).slice(0,2);return shuffle([answer,...wrong]);}
function nextQuestion(count=true){if(count)state.q++; else state.q=1; state.ui="waiting";state.feedback=null;state.hintOpen=false;state.moreOpen=false;state.answer=pickAnswer();if(!state.answer)return result('続けられる国がありません');state.choices=choices(state.answer);renderGame();}
function renderGame(){const p=player();screen(`<header class="topbar"><span>第${Math.min(state.q,state.total)}問 / ${state.total}問</span><strong>${state.mode==='multi'?p.name+'の番':p.name}</strong><span>ライフ <b class="life">${hearts(p.hp)}</b></span></header><section class="currentCountry" aria-label="いまの国">${flagImg(state.current,'currentFlag')}<div><span>現在の国</span><strong>${state.current.name}</strong><small>${state.current.reading}</small></div></section><section class="question"><span>つぎは</span><strong>「${state.need}」</strong><span>から始まる国</span></section><section class="choices" aria-label="選択肢">${state.choices.map(c=>choiceButton(c)).join('')}</section><section class="feedbackLine" aria-live="polite">${feedbackLine()}</section><footer class="gameActions"><button id="hint" class="hint" ${state.ui!=='waiting'?'disabled':''}>${state.hintOpen?'ヒントを隠す':'ヒントを見る'}</button><button id="restart" class="menuRestart" type="button">メニュー</button></footer>`,"game");document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>answer(b.dataset.id));$('#hint').onclick=toggleHint;$('#restart').onclick=confirmRestart;document.querySelector('#more')?.addEventListener('click',()=>{state.moreOpen=!state.moreOpen;renderGame();});}
function choiceButton(c){const picked=state.feedback?.picked===c.id, correct=state.feedback&&state.answer.id===c.id;let label='',cls='',show=state.hintOpen;if(state.ui==='correct'&&picked){label='正解！';cls=' isCorrect';show=true}else if(state.ui==='incorrect'&&picked){label='ちがう';cls=' isWrong';show=true}else if(state.ui==='incorrect'&&correct){label='正解';cls=' isCorrect';show=true}return `<button type="button" class="choice${cls}" data-id="${c.id}" ${state.ui!=='waiting'?'disabled':''}>${flagImg(c)}<span class="resultMark">${label}</span>${show?`<b class="revealedName">${c.name}</b>`:'<b class="revealedName placeholder">&nbsp;</b>'}</button>`;}
function feedbackLine(){if(!state.feedback)return '<span class="muted">国旗を選んでね。ヒントで国名を表示できます。</span>';const c=state.feedback.country;const msg=state.feedback.ok?'正解！':`正解は${c.name}`;return `<div class="miniFeedback ${state.feedback.ok?'ok':'bad'}"><strong>${msg}</strong><button id="more" type="button" class="more">${state.moreOpen?'閉じる':'もっと見る'}</button>${state.moreOpen?`<p>首都：${c.capital||'—'}。${c.trivia||''}</p>`:''}</div>`;}
function answer(id){if(state.ui!=="waiting")return;state.ui='answering';renderGame();window.setTimeout(()=>{const picked=countries.find(c=>c.id===id), ok=id===state.answer.id;state.ui=ok?'correct':'incorrect';state.feedback={ok,picked:id,country:ok?picked:state.answer};if(ok){advance(picked);if(state.mode==='multi')nextTurn();}else{player().hp--;advance(state.answer);}renderGame();const delay=ok?1000:1500;window.setTimeout(()=>{if(state.mode==='solo'&&(state.q>=state.total||player().hp<=0))return result(player().hp<=0?'ゲームオーバー':'10問クリア！');if(state.mode==='multi'){if(player().hp<=0)player().out=true;if(active().length<=1)return result(`${active()[0].name}の勝ち！`);nextTurn();}nextQuestion(true);},delay);},80);}
function advance(c){if(!state.used.includes(c.id))state.used.push(c.id);state.current=c;state.need=last(c.reading);}
function toggleHint(){if(state.ui!=="waiting")return;state.hintOpen=!state.hintOpen;renderGame();}
function confirmRestart(){if(confirm('タイトルへ戻りますか？'))title();}
function result(head){state.ui='finished';screen(`<div class="center"><h2 class="title">${head}</h2><ol class="resultList">${state.players.map(p=>`<li>${p.name}：${p.out?'脱落':'プレイ終了'} / ${hearts(Math.max(0,p.hp))}</li>`).join('')}</ol><p class="lead">遊んだ問題数：${Math.min(state.q,state.total)}問</p><div class="row"><button id="again">もう一度</button><button id="home" class="secondary">タイトルへ</button></div></div>`);$('#again').onclick=()=>state.mode==='solo'?start('solo',[{name:'あなた',hp:3,out:false}]):setupMulti();$('#home').onclick=title;}
title();})();
</script>
</body>
</html>
